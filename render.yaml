# Render Blueprint —— 让 NGR 考核平台一键部署到云端
# 用法：在 Render 里 New → Blueprint → 关联本仓库，Render 会自动按此文件部署。
services:
  - type: web
    name: ngr-kaohe
    runtime: node
    plan: free                 # 免费档，无需信用卡
    branch: master
    # 零依赖，无需构建；直接启动服务
    buildCommand: "echo 'no build needed'"
    startCommand: "node server.js"
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # 免费实例不支持持久磁盘(disk)，DB_PATH 不设则用默认路径 data/db.json
      # 注意：免费实例重新部署会清空数据。如需数据持久化请升级到付费实例并取消下面的注释：
      # - key: DB_PATH
      #   value: "/data/db.json"
