# Render Blueprint —— 让 NGR 考核平台一键部署到云端
# 用法：在 Render 里 New → Blueprint → 关联本仓库，Render 会自动按此文件部署。
services:
  - type: web
    name: ngr-kaohe
    runtime: node
    plan: free                 # 免费档，无需信用卡
    branch: master
    # 零依赖，无需构建；直接启动服务
    buildCommand: "echo 'no build needed'"
    startCommand: "node server.js"
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_PATH           # 数据存到持久盘，重启/重新部署不丢
        value: "/data/db.json"
    # 持久磁盘：免费实例重启会清空本地文件，挂盘后数据保留
    disk:
      name: ngr-data
      mountPath: /data
      sizeGB: 1
